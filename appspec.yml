version: 0.0
os: linux
files:
  - source: /
    destination: /home/ubuntu/mi-app-codedeploy
    overwrite: true
permissions:
  - object: /home/ubuntu/mi-app-codedeploy
    owner: ubuntu
    group: ubuntu
hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 10
      runas: ubuntu
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 30
      runas: ubuntu
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 60
      runas: ubuntu
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 10
      runas: ubuntu